name: CI/CD — RistoBrain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository }}/ristobrain-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/ristobrain-frontend

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint & Type-check
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci --frozen-lockfile

      - name: Type-check backend
        working-directory: backend
        run: npx tsc --noEmit

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --frozen-lockfile

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc --noEmit

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build & Push Docker images (solo su push a main)
# ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta — Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker meta — Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Salva lo SHA dell'immagine per il job di deploy
      - name: Export image tag
        id: image-tag
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Deploy su server di produzione via SSH
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy in produzione
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://${{ secrets.PROD_DOMAIN }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            cd /opt/ristobrain

            # Aggiorna il repository
            git pull origin main

            # Login al registry
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Imposta il tag dell'immagine
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export GITHUB_REPOSITORY=${{ github.repository }}

            # Pull delle nuove immagini
            docker compose -f docker-compose.prod.yml \
              --env-file .env pull backend frontend

            # Riavvio rolling (zero-downtime)
            docker compose -f docker-compose.prod.yml \
              --env-file .env up -d --no-deps backend frontend nginx

            # Pulizia immagini vecchie
            docker image prune -f

            # Health check post-deploy
            sleep 15
            curl -fsS https://${{ secrets.PROD_DOMAIN }}/health \
              || (echo "Health check FALLITO!" && exit 1)

            echo "✅ Deploy completato: $IMAGE_TAG"

      - name: Notifica successo
        if: success()
        run: |
          echo "🚀 Deploy di ${{ needs.build-and-push.outputs.image_tag }} completato!"
          echo "URL: https://${{ secrets.PROD_DOMAIN }}"

      - name: Notifica fallimento
        if: failure()
        run: |
          echo "❌ Deploy FALLITO per ${{ needs.build-and-push.outputs.image_tag }}"
          echo "Controlla i log su GitHub Actions"
