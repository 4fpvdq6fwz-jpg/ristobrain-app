version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ristobrain_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ristobrain
      POSTGRES_USER: ristobrain
      POSTGRES_PASSWORD: ristobrain_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ristobrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ristobrain_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ristobrain_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ristobrain:ristobrain_secret@postgres:5432/ristobrain
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_this_in_production_super_secret_key
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ristobrain_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
