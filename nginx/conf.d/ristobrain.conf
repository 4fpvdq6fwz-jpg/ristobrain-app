# ─────────────────────────────────────────────────────────────────────────────
# STEP 1 — HTTP: redirect tutto su HTTPS + challenge certbot
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name TUODOMINIO.COM www.TUODOMINIO.COM;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tutto il resto → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# STEP 2 — HTTPS: frontend + proxy API
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name TUODOMINIO.COM www.TUODOMINIO.COM;

    # ── Certificati SSL (Let's Encrypt) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/TUODOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TUODOMINIO.COM/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/TUODOMINIO.COM/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Upload size ───────────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ── API → Backend Express ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Rate limit extra sulle route auth
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://backend:4000/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:4000/health;
        access_log off;
    }

    # ── Frontend Next.js ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static assets con cache ───────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend:3000/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
